<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GF インセルダム 売上ランキング</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --green: #0F6E56;
    --green-light: #E1F5EE;
    --blue: #185FA5;
    --red: #E24B4A;
    --amber: #BA7517;
    --teal: #1D9E75;
    --bg: #F8F7F4;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --text-muted: #6B6B6B;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ヘッダー */
  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 680px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
  .logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .last-updated { font-size: 11px; color: var(--text-muted); }

  /* コンテンツ */
  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }

  /* 月タブ */
  .month-bar { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
  .month-bar::-webkit-scrollbar { display: none; }
  .mtab { flex-shrink: 0; padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all .15s; font-family: inherit; font-weight: 500; }
  .mtab.active { background: var(--green); color: #fff; border-color: transparent; }
  .mtab:hover:not(.active) { border-color: var(--green); color: var(--green); }

  /* ランキング */
  .rank-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .rank-row { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all .18s; position: relative; overflow: hidden; }
  .rank-row::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
  .rank-row.r0::after { background: #C49A00; }
  .rank-row.r1::after { background: #9E9E9E; }
  .rank-row.r2::after { background: #A0522D; }
  .rank-row:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.08); }
  .rank-row.selected { border-color: var(--green); border-width: 1.5px; }
  .rank-badge { font-size: 20px; min-width: 28px; text-align: center; }
  .rank-num-text { font-size: 14px; font-weight: 700; color: var(--text-muted); min-width: 28px; text-align: center; }
  .rank-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .rank-body { flex: 1; min-width: 0; }
  .rank-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .rank-sales { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .rank-right { text-align: right; flex-shrink: 0; }
  .rank-score { font-size: 20px; font-weight: 700; color: var(--green); line-height: 1; }
  .rank-score-lbl { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .rank-bar-wrap { margin-top: 4px; height: 3px; background: #eee; border-radius: 2px; overflow: hidden; min-width: 60px; }
  .rank-bar-fill { height: 100%; border-radius: 2px; transition: width .5s ease; }

  /* 詳細パネル */
  .detail-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; display: none; }
  .detail-panel.open { display: block; animation: slideDown .2s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .detail-hero { padding: 20px; background: linear-gradient(135deg, #f0faf6 0%, #fff 100%); border-bottom: 1px solid var(--border); }
  .hero-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .hero-avatar { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; flex-shrink: 0; }
  .hero-info { flex: 1; }
  .hero-name { font-size: 20px; font-weight: 700; color: var(--text); }
  .hero-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 4px; }
  .hero-score-block { text-align: right; }
  .hero-score { font-size: 36px; font-weight: 700; color: var(--green); line-height: 1; }
  .hero-score-lbl { font-size: 12px; color: var(--text-muted); }
  .hero-vs { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* 成績サマリー */
  .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media(max-width: 480px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
  .metric-card { background: rgba(255,255,255,.8); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; text-align: center; }
  .metric-val { font-size: 16px; font-weight: 700; color: var(--text); }
  .metric-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  /* タブ */
  .dtab-row { display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .dtab-row::-webkit-scrollbar { display: none; }
  .dtab { flex-shrink: 0; padding: 12px 18px; font-size: 13px; color: var(--text-muted); cursor: pointer; border: none; background: transparent; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; font-family: inherit; font-weight: 500; }
  .dtab.active { color: var(--green); border-bottom-color: var(--green); }

  .panel-body { padding: 20px; }

  /* レーダー */
  .chart-wrap { position: relative; width: 100%; height: 300px; }

  /* アクション比較バー */
  .action-bars { display: flex; flex-direction: column; gap: 14px; }
  .ab-row { display: grid; grid-template-columns: 76px 1fr; gap: 10px; align-items: center; }
  .ab-label { font-size: 12px; color: var(--text-muted); text-align: right; font-weight: 500; }
  .ab-right { display: flex; flex-direction: column; gap: 4px; }
  .ab-track { position: relative; height: 22px; background: #f0f0f0; border-radius: 6px; overflow: hidden; }
  .ab-bar-top { position: absolute; top: 0; left: 0; height: 100%; border-radius: 6px; opacity: .2; transition: width .5s ease; }
  .ab-bar-you { position: absolute; top: 0; left: 0; height: 100%; border-radius: 6px; transition: width .5s ease; display: flex; align-items: center; padding-left: 8px; }
  .ab-bar-you-label { font-size: 10px; font-weight: 700; color: #fff; white-space: nowrap; }
  .ab-meta { display: flex; justify-content: space-between; align-items: center; }
  .ab-myval { font-size: 12px; font-weight: 600; color: var(--text); }
  .ab-topval { font-size: 11px; color: var(--text-muted); }
  .ab-gap-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }

  /* アドバイス */
  .advice-list { display: flex; flex-direction: column; gap: 12px; }
  .advice-card { border-radius: var(--radius-sm); padding: 14px 16px; border-left: 4px solid; }
  .advice-card.weak { background: #fff5f5; border-left-color: var(--red); }
  .advice-card.mid  { background: #fffbf0; border-left-color: var(--amber); }
  .advice-card.good { background: #f0faf6; border-left-color: var(--teal); }
  .advice-tag { font-size: 11px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .advice-card.weak .advice-tag { color: var(--red); }
  .advice-card.mid  .advice-tag { color: var(--amber); }
  .advice-card.good .advice-tag { color: var(--teal); }
  .advice-action-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .advice-text { font-size: 13px; color: var(--text); line-height: 1.75; }
  .advice-numbers { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; gap: 12px; }
  .advice-numbers span { display: flex; align-items: center; gap: 4px; }

  /* ローディング */
  .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
  .loading-dot { display: inline-block; width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin: 0 3px; animation: bounce .6s infinite alternate; }
  .loading-dot:nth-child(2) { animation-delay: .2s; }
  .loading-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { to { transform: translateY(-6px); } }

  /* エラー */
  .error-box { background: #fff5f5; border: 1px solid #fcc; border-radius: var(--radius-sm); padding: 16px; font-size: 13px; color: #c0392b; margin-bottom: 16px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-dot"></div>
      <div>
        <div class="logo-text">GF インセルダム</div>
        <div class="logo-sub">売上ランキング</div>
      </div>
    </div>
    <div class="last-updated" id="lastUpdated"></div>
  </div>
</header>

<div class="container">
  <div id="loadingState" class="loading">
    <div style="margin-bottom:12px">データを読み込み中</div>
    <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
  </div>
  <div id="errorState" class="error-box" style="display:none"></div>
  <div id="mainContent" style="display:none">
    <div class="month-bar" id="monthBar"></div>
    <div class="rank-list" id="rankList"></div>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-hero">
        <div class="hero-top">
          <div class="hero-avatar" id="heroAvatar"></div>
          <div class="hero-info">
            <div class="hero-name" id="heroName"></div>
            <div class="hero-badge" id="heroBadge"></div>
          </div>
          <div class="hero-score-block">
            <div class="hero-score" id="heroScore"></div>
            <div class="hero-score-lbl">総合点</div>
            <div class="hero-vs" id="heroVs"></div>
          </div>
        </div>
        <div class="metrics-grid" id="metricsGrid"></div>
      </div>
      <div class="dtab-row">
        <button class="dtab active" onclick="switchTab('radar',this)">📡 レーダー比較</button>
        <button class="dtab" onclick="switchTab('bars',this)">📊 アクション別</button>
        <button class="dtab" onclick="switchTab('advice',this)">💡 次のアクション</button>
      </div>
      <div class="panel-body">
        <div id="tabRadar"><div class="chart-wrap"><canvas id="rc"></canvas></div></div>
        <div id="tabBars" style="display:none"><div class="action-bars" id="actionBars"></div></div>
        <div id="tabAdvice" style="display:none"><div class="advice-list" id="adviceList"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== 設定 =====
const SHEET_ID = '1oyEfnC2LoGCgn--ydpywNJ5Is7-eBL9_6Zszob7zdbA';
const GID = '462947909';

const AXES = [
  {k:'sales', label:'商品売上',    w:.25, max:1500000, fmt:v=>'¥'+Math.round(v/10000)+'万'},
  {k:'mall',  label:'モール売上',  w:.20, max:600000,  fmt:v=>'¥'+Math.round(v/10000)+'万'},
  {k:'story', label:'ストーリー',  w:.12, max:60,      fmt:v=>v+'件'},
  {k:'reel',  label:'リール',      w:.10, max:20,      fmt:v=>v+'件'},
  {k:'intro', label:'GF紹介',      w:.12, max:9,       fmt:v=>v+'件'},
  {k:'bEv',   label:'B説明会',     w:.08, max:5,       fmt:v=>v+'回'},
  {k:'cEv',   label:'C説明会',     w:.08, max:5,       fmt:v=>v+'回'},
  {k:'pm',    label:'PM獲得',      w:.05, max:11,      fmt:v=>v+'人'},
];

const PALETTES = ['#0F6E56','#185FA5','#D85A30','#7F77DD','#BA7517','#993556','#3B6D11','#085041'];
const MEDALS = ['🥇','🥈','🥉'];

const TIPS = {
  sales:{
    weak: '商品売上が伸び代ナンバーワンです。既存のお客様へ3日以内のフォローアップ連絡と、SNSでの商品投稿を週2本以上を目標に取り組みましょう。',
    mid:  '商品売上はまずまずです。購入後のお客様レビュー収集や、リピート促進メッセージの送付で底上げを狙いましょう。',
    good: '商品売上は優秀なレベルです。モール売上とのバランスを意識してさらに伸ばしましょう。',
  },
  mall:{
    weak: 'RIMANモールの活用が少ないです。モールへの誘導投稿を週1本追加し、モール限定の魅力をSNSで発信しましょう。',
    mid:  'モール売上に伸び代があります。ストーリーやリールでモールへの誘導を強化し、月間売上アップを狙いましょう。',
    good: 'モール売上は好調です！この調子を維持しましょう。',
  },
  story:{
    weak: 'ストーリー投稿が少なすぎます。毎日1投稿（使用シーン・お客様の声・日常使い）を習慣化しましょう。朝のルーティン投稿から始めるのがおすすめです。',
    mid:  'ストーリーをあと週3〜4本増やすと大きく差が縮まります。起床時・昼・夜の3回投稿を意識してみましょう。',
    good: 'ストーリー投稿は高水準です。内容の多様化（Before/After・Q&A形式）も意識してみましょう。',
  },
  reel:{
    weak: 'リール・フィード投稿が少ないです。週2〜3本を目標に、成分説明や使い方動画を投稿しましょう。30秒以内の短尺でも効果的です。',
    mid:  'リール投稿を週1本増やすと大きく伸びます。「よくある質問」や「1ヶ月後の変化」系の動画は反応が取りやすいです。',
    good: 'リール・フィード投稿は十分です！品質（字幕・サムネイル）の向上を検討しましょう。',
  },
  intro:{
    weak: 'GF公式LINEへの紹介数を伸ばすことがチーム全体の底上げにつながります。プロフィール欄とストーリーに紹介リンクを常設しましょう。',
    mid:  '紹介数をもう少し増やせると上位が見えてきます。フォロワーへの個別DM案内も効果的です。',
    good: 'GF紹介は優秀です。紹介したお客様のフォローアップも丁寧に行いましょう。',
  },
  bEv:{
    weak: 'B向け説明会の開催回数が少ないです。月2回以上を目標に、オンライン説明会を活用して場所・時間の壁をなくしましょう。',
    mid:  'B向け説明会をあと1回/月増やせると上位が見えてきます。既存メンバーに共催をお願いするのも効果的です。',
    good: 'B向け説明会は十分な回数です。参加後の個別フォローも丁寧に行いましょう。',
  },
  cEv:{
    weak: 'C向け体験会が少ないです。商品を実際に試してもらえる場を積極的に作りましょう。少人数のお茶会形式でも十分効果的です。',
    mid:  'C向け体験会をもう1〜2回増やすとPM獲得率も上がります。「紹介型体験会」を試してみましょう。',
    good: 'C向け体験会は十分です。参加者のアフターフォローで成約率を上げましょう。',
  },
  pm:{
    weak: 'PM/M/SM獲得に大きな伸び代があります。体験会参加者への個別フォローを3日以内に行い、「一緒にやりませんか？」の声かけのタイミングを意識しましょう。',
    mid:  'PM獲得をあと数人増やせると大きくスコアアップします。既存メンバーの成功体験を積極的に共有しましょう。',
    good: 'PM/M/SM獲得は高水準です！チームの拡大を維持しましょう。',
  },
};

// ===== 状態 =====
let allData = [];
let curMonth = '';
let curMember = null;
let chartInst = null;

// ===== CSVパース =====
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const rows = [];
  for (const line of lines) {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur);
    rows.push(cols);
  }
  return rows;
}

function num(v) { const n = parseFloat((v||'').replace(/[^0-9.]/g,'')); return isNaN(n) ? 0 : n; }

// ===== データ取得 =====
async function fetchData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('スプレッドシートの取得に失敗しました');
  const text = await res.text();
  const rows = parseCSV(text);
  if (rows.length < 2) throw new Error('データが見つかりませんでした');

  allData = rows.slice(1).map(r => {
    const dt = r[2] || '';
    const match = dt.match(/(\d{4})-(\d{2})/);
    const month = match ? `${match[1]}-${match[2]}` : '不明';
    return {
      name:  r[6] || r[5] || '不明',
      month,
      sales: num(r[7]),
      mall:  num(r[8]),
      story: num(r[9]),
      reel:  num(r[10]),
      intro: num(r[11]),
      bEv:   num(r[12]),
      cEv:   num(r[13]),
      pm:    num(r[14]),
    };
  }).filter(d => d.name && d.name !== '不明');

  document.getElementById('lastUpdated').textContent = '最終更新: ' + new Date().toLocaleDateString('ja-JP');
}

// ===== スコア計算 =====
function calcScore(d) {
  return Math.round(AXES.reduce((s,a) => s + (Math.min(d[a.k], a.max) / a.max) * a.w * 100, 0) * 10) / 10;
}

function getMonths() { return [...new Set(allData.map(d => d.month))].sort().reverse(); }

function byMonth(m) {
  return allData.filter(d => d.month === m)
    .map(d => ({...d, score: calcScore(d)}))
    .sort((a,b) => b.score - a.score);
}

// ===== 月タブ =====
function renderMonthBar() {
  const months = getMonths();
  document.getElementById('monthBar').innerHTML = months.map(m => {
    const [y, mo] = m.split('-');
    const label = `${y}年${parseInt(mo)}月`;
    return `<button class="mtab${m===curMonth?' active':''}" onclick="setMonth('${m}')">${label}</button>`;
  }).join('');
}

// ===== ランキング =====
function renderRank(data) {
  const top = data[0];
  document.getElementById('rankList').innerHTML = data.map((d, i) => {
    const pct = Math.round((d.score / top.score) * 100);
    const col = PALETTES[i % PALETTES.length];
    const isTop3 = i < 3;
    const badge = isTop3 ? `<div class="rank-badge">${MEDALS[i]}</div>` : `<div class="rank-num-text">${i+1}</div>`;
    const cls = `r${i}`;
    const sel = curMember === d.name ? ' selected' : '';
    const totalSales = (d.sales + d.mall).toLocaleString();
    return `<div class="rank-row ${cls}${sel}" onclick="pick('${d.name}')">
      ${badge}
      <div class="rank-avatar" style="background:${col}22;color:${col}">${d.name.slice(0,2)}</div>
      <div class="rank-body">
        <div class="rank-name">${d.name}</div>
        <div class="rank-sales">売上合計 ¥${totalSales}</div>
      </div>
      <div class="rank-right">
        <div class="rank-score">${d.score}</div>
        <div class="rank-score-lbl">総合点</div>
        <div class="rank-bar-wrap"><div class="rank-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ===== 詳細パネル =====
function renderDetail(data) {
  const member = data.find(d => d.name === curMember);
  if (!member) { document.getElementById('detailPanel').classList.remove('open'); return; }

  const rank = data.findIndex(d => d.name === curMember);
  const top  = data[0];
  const col  = PALETTES[rank % PALETTES.length];

  document.getElementById('detailPanel').classList.add('open');

  const av = document.getElementById('heroAvatar');
  av.textContent = member.name.slice(0,2);
  av.style.background = col + '22';
  av.style.color = col;

  document.getElementById('heroName').textContent = member.name;
  const badge = document.getElementById('heroBadge');
  badge.textContent = rank === 0 ? '🏆 トップメンバー' : `${rank+1}位 / ${data.length}名中`;
  badge.style.background = col + '18';
  badge.style.color = col;

  document.getElementById('heroScore').textContent = member.score;
  const vs = document.getElementById('heroVs');
  vs.textContent = rank === 0
    ? '👑 現在トップ！この調子で！'
    : `トップまで ${(top.score - member.score).toFixed(1)}点差`;

  // メトリクス
  document.getElementById('metricsGrid').innerHTML = [
    {label:'商品売上', val:'¥'+(member.sales/10000).toFixed(0)+'万'},
    {label:'モール',   val:'¥'+(member.mall/10000).toFixed(0)+'万'},
    {label:'ストーリー', val:member.story+'件'},
    {label:'PM獲得',   val:member.pm+'人'},
  ].map(m => `<div class="metric-card"><div class="metric-val">${m.val}</div><div class="metric-lbl">${m.label}</div></div>`).join('');

  buildRadar(member, top, col, data);
  buildBars(member, top, col);
  buildAdvice(member, top);
}

function buildRadar(member, top, col, data) {
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const labels  = AXES.map(a => a.label);
  const myVals  = AXES.map(a => Math.round((Math.min(member[a.k],a.max)/a.max)*100));
  const topVals = AXES.map(a => Math.round((Math.min(top[a.k],a.max)/a.max)*100));

  chartInst = new Chart(document.getElementById('rc'), {
    type: 'radar',
    data: {
      labels,
      datasets: [
        {label: top.name+'（1位）', data: topVals, backgroundColor:'rgba(24,95,165,.08)', borderColor:'#185FA5', borderWidth:1.5, pointRadius:3, pointBackgroundColor:'#185FA5'},
        {label: member.name,        data: myVals,  backgroundColor: col+'28',             borderColor: col,       borderWidth:2,   pointRadius:4, pointBackgroundColor: col},
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: true, position: 'bottom', labels: { font:{size:11}, color:'#888', boxWidth:10, padding:14 } } },
      scales: { r: { min:0, max:100, ticks:{display:false}, grid:{color:'rgba(0,0,0,.07)'}, angleLines:{color:'rgba(0,0,0,.07)'}, pointLabels:{font:{size:11},color:'#555'} } }
    }
  });
}

function buildBars(member, top, col) {
  const myVals  = AXES.map(a => Math.round((Math.min(member[a.k],a.max)/a.max)*100));
  const topVals = AXES.map(a => Math.round((Math.min(top[a.k],a.max)/a.max)*100));

  document.getElementById('actionBars').innerHTML = AXES.map((a, i) => {
    const myPct  = myVals[i];
    const topPct = topVals[i];
    const gap    = topPct - myPct;
    const barCol = gap > 35 ? '#E24B4A' : gap > 15 ? '#BA7517' : '#1D9E75';
    const pillBg = gap > 35 ? '#fff0f0' : gap > 15 ? '#fff8e1' : '#f0faf6';
    const gapLabel = gap > 35 ? '要強化' : gap > 15 ? '伸び代あり' : '良好';

    return `<div class="ab-row">
      <div class="ab-label">${a.label}</div>
      <div class="ab-right">
        <div class="ab-track">
          <div class="ab-bar-top" style="width:${topPct}%;background:#185FA5"></div>
          <div class="ab-bar-you" style="width:${myPct}%;background:${barCol}">
            ${myPct > 12 ? `<span class="ab-bar-you-label">${myPct}%</span>` : ''}
          </div>
        </div>
        <div class="ab-meta">
          <span class="ab-myval">${a.fmt(member[a.k])}</span>
          <span class="ab-topval">トップ: ${a.fmt(top[a.k])}</span>
          <span class="ab-gap-pill" style="background:${pillBg};color:${barCol}">${gapLabel}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function buildAdvice(member, top) {
  const myVals  = AXES.map(a => Math.round((Math.min(member[a.k],a.max)/a.max)*100));
  const topVals = AXES.map(a => Math.round((Math.min(top[a.k],a.max)/a.max)*100));

  const sorted = AXES.map((a,i) => ({a, gap: topVals[i]-myVals[i], myPct: myVals[i]}))
    .sort((a,b) => b.gap - a.gap);

  document.getElementById('adviceList').innerHTML = sorted.slice(0,4).map(({a, gap}) => {
    const level = gap > 35 ? 'weak' : gap > 15 ? 'mid' : 'good';
    const tag   = gap > 35 ? '⚡ 要強化' : gap > 15 ? '📈 伸び代あり' : '✅ 良好';
    const text  = TIPS[a.k][level];
    return `<div class="advice-card ${level}">
      <div class="advice-tag">${tag}</div>
      <div class="advice-action-name">${a.label}</div>
      <div class="advice-text">${text}</div>
      <div class="advice-numbers">
        <span>📌 現在: ${a.fmt(member[a.k])}</span>
        <span>🏆 トップ: ${a.fmt(top[a.k])}</span>
      </div>
    </div>`;
  }).join('');
}

// ===== タブ切替 =====
function switchTab(id, btn) {
  ['Radar','Bars','Advice'].forEach(t => {
    document.getElementById('tab'+t).style.display = t.toLowerCase()===id ? 'block' : 'none';
  });
  document.querySelectorAll('.dtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (id === 'radar' && curMember) {
    const data = byMonth(curMonth);
    const member = data.find(d => d.name === curMember);
    const top    = data[0];
    const rank   = data.findIndex(d => d.name === curMember);
    buildRadar(member, top, PALETTES[rank % PALETTES.length], data);
  }
}

// ===== インタラクション =====
function pick(name) {
  curMember = curMember === name ? null : name;
  const data = byMonth(curMonth);
  renderRank(data);
  renderDetail(data);
  if (curMember) {
    setTimeout(() => document.getElementById('detailPanel').scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
  }
}

function setMonth(m) {
  curMonth  = m;
  curMember = null;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  document.getElementById('detailPanel').classList.remove('open');
  renderMonthBar();
  renderRank(byMonth(m));
}

// ===== 初期化 =====
async function init() {
  try {
    await fetchData();
    const months = getMonths();
    curMonth = months[0];
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display  = 'block';
    renderMonthBar();
    renderRank(byMonth(curMonth));
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    const err = document.getElementById('errorState');
    err.style.display = 'block';
    err.textContent = 'エラー: ' + e.message + '　スプレッドシートの共有設定を「リンクを知っている全員が閲覧可能」にしてください。';
  }
}

init();
</script>
